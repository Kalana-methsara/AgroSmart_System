<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>AgroSmart Pro · Spring Boot Field Management</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .field-card {
      transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      animation: fadeSlideUp 0.4s ease-out;
    }
    .field-card:hover {
      transform: translateY(-6px) scale(1.01);
      box-shadow: 0 25px 35px -12px rgba(0, 0, 0, 0.25);
    }
    .btn-primary {
      background: linear-gradient(135deg, #15803d, #166534);
      transition: all 0.25s ease;
      box-shadow: 0 4px 10px rgba(21, 128, 61, 0.2);
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 20px -8px rgba(21, 128, 61, 0.4);
    }
    .modal-input, .modal-select, .modal-textarea {
      width: 100%;
      padding: 0.7rem 1rem;
      margin-top: 0.4rem;
      margin-bottom: 0.8rem;
      border: 1.5px solid #e2e8f0;
      border-radius: 1rem;
      font-size: 0.95rem;
      transition: all 0.2s;
      background-color: #fefefe;
    }
    .modal-input:focus, .modal-select:focus, .modal-textarea:focus {
      outline: none;
      border-color: #15803d;
      box-shadow: 0 0 0 3px rgba(21, 128, 61, 0.2);
    }
    .image-preview {
      width: 85px;
      height: 85px;
      object-fit: cover;
      border-radius: 16px;
      border: 2px solid #ffffff;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      transition: all 0.2s;
    }
    .image-preview:hover {
      transform: scale(1.08);
      border-color: #15803d;
      cursor: pointer;
    }
    .image-container {
      position: relative;
      display: inline-block;
    }
    .remove-image {
      position: absolute;
      top: -10px;
      right: -10px;
      background: #dc2626;
      color: white;
      border-radius: 50%;
      width: 26px;
      height: 26px;
      cursor: pointer;
      text-align: center;
      font-size: 14px;
      font-weight: bold;
      line-height: 24px;
      transition: all 0.2s;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }
    .remove-image:hover {
      background: #b91c1c;
      transform: scale(1.1);
    }
    .location-info-card {
      background: #eef2ff;
      padding: 8px 12px;
      border-radius: 14px;
      margin-top: 10px;
      font-size: 0.8rem;
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }
    #mapModal {
      height: 320px;
      border-radius: 20px;
      margin-top: 12px;
      z-index: 1;
      border: 2px solid #eef2ff;
    }
    .stat-card-modern {
      background: white;
      border-radius: 1.5rem;
      transition: all 0.2s;
      border: 1px solid rgba(21,128,61,0.1);
    }
    .stat-card-modern:hover {
      transform: translateY(-3px);
      border-color: #15803d40;
    }
    .image-gallery-scroll {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 12px;
      max-height: 210px;
      overflow-y: auto;
      padding: 8px;
      background: #fafbfe;
      border-radius: 20px;
      border: 1px dashed #cbd5e1;
    }
    .line-clamp-2 {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
  </style>
</head>
<body class="bg-gradient-to-br from-gray-50 to-green-50/30 font-sans antialiased">

<div id="loadingOverlay" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 hidden items-center justify-center">
  <div class="bg-white rounded-3xl p-8 shadow-2xl flex flex-col items-center">
    <div class="w-20 h-20 border-4 border-green-200 border-t-green-700 rounded-full animate-spin mb-5"></div>
    <p class="text-gray-700 font-bold">Processing request...</p>
  </div>
</div>

<main class="min-h-screen p-5 md:p-8 lg:p-10">
  <!-- Header -->
  <div class="mb-10 bg-white/80 backdrop-blur-sm rounded-3xl p-6 shadow-sm border border-green-100">
    <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-5">
      <div>
        <div class="flex items-center gap-2 mb-1">
          <i class="fa-solid fa-seedling text-green-700 text-2xl"></i>
          <span class="text-xs font-mono bg-green-100 text-green-800 px-3 py-1 rounded-full">Spring Boot Backend</span>
        </div>
        <h1 class="text-3xl md:text-4xl font-extrabold text-gray-800 flex items-center gap-3">
          <i class="fa-solid fa-map-location-dot text-green-600 text-3xl"></i>
          Field Management System
        </h1>
        <p class="text-gray-500 mt-1">Connected to Spring Boot REST API · Real-time CRUD operations</p>
      </div>
      <button id="addFieldBtn" class="btn-primary px-7 py-3.5 rounded-2xl text-white font-bold shadow-lg flex items-center gap-2 transition-all">
        <i class="fas fa-plus-circle text-xl"></i> Register New Field
      </button>
    </div>
  </div>

  <!-- Statistics Cards -->
  <div class="grid grid-cols-2 md:grid-cols-4 gap-5 mb-10">
    <div class="stat-card-modern rounded-2xl p-5 shadow-sm border-l-[6px] border-green-600">
      <div class="flex justify-between items-start">
        <div><p class="text-gray-500 text-sm font-medium">Total Fields</p><p class="text-3xl font-black text-gray-800" id="totalFields">0</p></div>
        <i class="fa-solid fa-map text-4xl text-green-200"></i>
      </div>
    </div>
    <div class="stat-card-modern rounded-2xl p-5 shadow-sm border-l-[6px] border-blue-500">
      <div class="flex justify-between"><div><p class="text-gray-500 text-sm">Active Fields</p><p class="text-3xl font-black text-gray-800" id="activeFields">0</p></div><i class="fa-solid fa-check-circle text-4xl text-blue-200"></i></div>
    </div>
    <div class="stat-card-modern rounded-2xl p-5 shadow-sm border-l-[6px] border-amber-500">
      <div class="flex justify-between"><div><p class="text-gray-500 text-sm">Total Hectares</p><p class="text-3xl font-black text-gray-800" id="totalArea">0</p></div><i class="fa-solid fa-chart-line text-4xl text-amber-200"></i></div>
    </div>
    <div class="stat-card-modern rounded-2xl p-5 shadow-sm border-l-[6px] border-purple-500">
      <div class="flex justify-between"><div><p class="text-gray-500 text-sm">Media Assets</p><p class="text-3xl font-black text-gray-800" id="fieldsWithImages">0</p></div><i class="fa-solid fa-camera-retro text-4xl text-purple-200"></i></div>
    </div>
  </div>

  <!-- Search & Filters -->
  <div class="mb-8 flex flex-wrap gap-4 items-center justify-between bg-white/70 p-4 rounded-2xl backdrop-blur-sm">
    <div class="flex flex-wrap gap-2">
      <button class="filter-btn px-5 py-2.5 rounded-full font-bold transition-all shadow-sm bg-green-700 text-white" data-filter="all">🌾 All Fields</button>
      <button class="filter-btn px-5 py-2.5 rounded-full bg-gray-100 text-gray-700 hover:bg-green-100 transition-all" data-filter="ACTIVE">✅ Active</button>
      <button class="filter-btn px-5 py-2.5 rounded-full bg-gray-100 text-gray-700 hover:bg-green-100 transition-all" data-filter="INACTIVE">⏸️ Inactive</button>
      <button class="filter-btn px-5 py-2.5 rounded-full bg-gray-100 text-gray-700 hover:bg-green-100 transition-all" data-filter="MAINTENANCE">🔧 Maintenance</button>
    </div>
    <div class="relative w-full md:w-72">
      <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
      <input type="text" id="fieldSearch" placeholder="Search by name or location..."
             class="pl-11 pr-5 py-2.5 border border-gray-200 rounded-full w-full focus:ring-2 focus:ring-green-400 focus:outline-none bg-white shadow-sm">
    </div>
  </div>

  <!-- Fields Grid -->
  <div id="fieldsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
</main>

<script>
  // API Configuration
  const API_BASE_URL = 'http://localhost:8080/api/v1';
  const FIELD_API = `${API_BASE_URL}/field`;

  // Global state
  let fields = [];
  let currentFilter = 'all';
  let currentSearch = '';
  let mapInstance = null;
  let activeMarker = null;
  let tempImages = [];

  // Helper functions
  function showLoading(show) {
    if (show) {
      $('#loadingOverlay').removeClass('hidden').addClass('flex');
    } else {
      $('#loadingOverlay').addClass('hidden').removeClass('flex');
    }
  }

  function getAuthToken() {
    return localStorage.getItem('accessToken') || localStorage.getItem('token') || '';
  }

  function escapeHtml(str) {
    if (!str) return '';
    return String(str)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
  }

  function safeString(value, defaultValue = '') {
    if (value === null || value === undefined) return defaultValue;
    return String(value);
  }

  // API Request function
  async function apiRequest(url, method, data = null) {
    const token = getAuthToken();
    const headers = {
      'Content-Type': 'application/json'
    };
    if (token) {
      headers['Authorization'] = `Bearer ${token}`;
    }

    const config = {
      method: method,
      headers: headers
    };

    if (data && (method === 'POST' || method === 'PUT')) {
      config.body = JSON.stringify(data);
    }

    const response = await fetch(url, config);

    if (!response.ok) {
      const errorText = await response.text();
      throw new Error(`HTTP ${response.status}: ${errorText || response.statusText}`);
    }

    return await response.json();
  }

  // Fetch all fields from backend
  async function fetchFields() {
    showLoading(true);
    try {
      const response = await apiRequest(`${FIELD_API}/all`, 'GET');

      // Handle different response structures
      if (response.code === 200 && Array.isArray(response.data)) {
        fields = response.data;
      } else if (Array.isArray(response)) {
        fields = response;
      } else if (response.data && Array.isArray(response.data)) {
        fields = response.data;
      } else {
        fields = [];
      }

      updateStatistics();
      renderFields();
    } catch (error) {
      console.error('Fetch error:', error);
      Swal.fire({
        icon: 'error',
        title: 'Connection Error',
        text: `Failed to connect to backend at ${API_BASE_URL}. Please ensure Spring Boot is running.`,
        footer: error.message
      });
      fields = [];
      renderFields();
      updateStatistics();
    } finally {
      showLoading(false);
    }
  }

  // Create field
  async function createField(fieldData) {
    showLoading(true);
    try {
      const response = await apiRequest(FIELD_API, 'POST', fieldData);
      Swal.fire({
        icon: 'success',
        title: 'Success!',
        text: `Field "${fieldData.name}" has been created.`,
        timer: 2000,
        showConfirmButton: false
      });
      await fetchFields();
      return true;
    } catch (error) {
      Swal.fire({
        icon: 'error',
        title: 'Creation Failed',
        text: error.message
      });
      return false;
    } finally {
      showLoading(false);
    }
  }

  // Update field
  async function updateField(id, fieldData) {
    showLoading(true);
    try {
      await apiRequest(`${FIELD_API}/${id}`, 'PUT', fieldData);
      Swal.fire({
        icon: 'success',
        title: 'Updated!',
        text: `Field "${fieldData.name}" has been updated.`,
        timer: 2000,
        showConfirmButton: false
      });
      await fetchFields();
      return true;
    } catch (error) {
      Swal.fire({
        icon: 'error',
        title: 'Update Failed',
        text: error.message
      });
      return false;
    } finally {
      showLoading(false);
    }
  }

  // Delete field
  async function deleteFieldById(id) {
    showLoading(true);
    try {
      await apiRequest(`${FIELD_API}/${id}`, 'DELETE');
      Swal.fire({
        icon: 'success',
        title: 'Deleted!',
        text: 'Field has been removed.',
        timer: 2000,
        showConfirmButton: false
      });
      await fetchFields();
      return true;
    } catch (error) {
      Swal.fire({
        icon: 'error',
        title: 'Deletion Failed',
        text: error.message
      });
      return false;
    } finally {
      showLoading(false);
    }
  }

  // Update statistics
  function updateStatistics() {
    $('#totalFields').text(fields.length);
    $('#activeFields').text(fields.filter(f => f.status === 'ACTIVE').length);

    let totalHectares = 0;
    fields.forEach(f => {
      let val = parseFloat(f.area) || 0;
      if (f.areaUnit === 'acres') val *= 0.404686;
      else if (f.areaUnit === 'sqm') val *= 0.0001;
      totalHectares += val;
    });
    $('#totalArea').text(totalHectares.toFixed(1));

    const withImages = fields.filter(f => {
      try {
        const images = JSON.parse(f.images || '[]');
        return Array.isArray(images) && images.length > 0;
      } catch (e) {
        return false;
      }
    }).length;
    $('#fieldsWithImages').text(withImages);
  }

  // Render fields grid
  function renderFields() {
    // Filter fields
    let filtered = fields.filter(field => {
      if (currentFilter !== 'all' && field.status !== currentFilter) return false;
      if (currentSearch) {
        const searchLower = currentSearch.toLowerCase();
        const nameMatch = safeString(field.name).toLowerCase().includes(searchLower);
        const locationMatch = safeString(field.location?.address || field.location).toLowerCase().includes(searchLower);
        if (!nameMatch && !locationMatch) return false;
      }
      return true;
    });

    const container = $('#fieldsGrid');

    if (filtered.length === 0) {
      container.html(`
        <div class="col-span-full text-center py-20 bg-white/80 rounded-3xl shadow-md border border-dashed border-green-200">
          <i class="fa-solid fa-database text-7xl mb-4 text-green-300"></i>
          <p class="text-2xl font-bold text-gray-600">No fields found</p>
          <p class="text-gray-400 mt-2">Click "Register New Field" to add your first field</p>
        </div>
      `);
      return;
    }

    const statusStyle = {
      'ACTIVE': 'bg-emerald-100 text-emerald-800 border-emerald-200',
      'INACTIVE': 'bg-gray-100 text-gray-700 border-gray-200',
      'MAINTENANCE': 'bg-amber-100 text-amber-800 border-amber-200'
    };

    let html = '';
    filtered.forEach(field => {
      let imagesArr = [];
      try {
        const parsed = JSON.parse(field.images || '[]');
        imagesArr = Array.isArray(parsed) ? parsed : [];
      } catch (e) {}

      const coverImg = imagesArr.length ? imagesArr[0] : null;
      const style = statusStyle[field.status] || statusStyle['INACTIVE'];

      // Handle location - could be string or object
      let locationDisplay = 'Not set';
      if (field.location) {
        if (typeof field.location === 'object') {
          locationDisplay = `${field.location.x || field.location.lng || field.location.longitude}, ${field.location.y || field.location.lat || field.location.latitude}`;
        } else {
          locationDisplay = field.location;
        }
      }

      html += `
        <div class="field-card bg-white rounded-3xl shadow-lg overflow-hidden flex flex-col border border-gray-100">
          <div class="relative h-52 bg-gradient-to-br from-gray-100 to-gray-50 flex items-center justify-center">
            ${coverImg ?
              `<img src="${coverImg}" class="w-full h-full object-cover transition duration-500 hover:scale-105" onerror="this.src='https://placehold.co/400x300?text=No+Image'">` :
              `<i class="fa-solid fa-map text-6xl text-green-300"></i>`
      }
            <div class="absolute top-4 left-4">
              <span class="px-3 py-1.5 rounded-full text-xs font-bold shadow-sm ${style} border">
                <i class="fas ${field.status === 'ACTIVE' ? 'fa-check-circle' : field.status === 'MAINTENANCE' ? 'fa-tools' : 'fa-pause'} mr-1"></i>
                ${field.status}
              </span>
            </div>
            ${imagesArr.length ? `
              <div class="absolute bottom-3 right-3 bg-black/50 backdrop-blur-md px-3 py-1 rounded-full text-white text-xs">
                <i class="fas fa-images mr-1"></i>${imagesArr.length}
              </div>
            ` : ''}
          </div>
          <div class="p-6 flex-grow">
            <h3 class="text-2xl font-extrabold text-gray-800 capitalize mb-2">${escapeHtml(field.name)}</h3>
            <div class="grid grid-cols-2 gap-3 mb-4">
              <div>
                <p class="text-xs text-gray-400">AREA</p>
                <p class="font-bold text-gray-700">${field.area || 0} ${field.areaUnit || 'acres'}</p>
              </div>
              <div>
                <p class="text-xs text-gray-400">LOCATION</p>
                <p class="font-medium text-gray-700 truncate" title="${escapeHtml(locationDisplay)}">
                  <i class="fas fa-map-marker-alt text-red-400 text-xs mr-1"></i>
                  ${escapeHtml(locationDisplay.substring(0, 30))}
                </p>
              </div>
            </div>
            ${field.description ? `
              <div class="mb-4">
                <p class="text-xs text-gray-400">DESCRIPTION</p>
                <p class="text-sm text-gray-600 line-clamp-2">${escapeHtml(field.description)}</p>
              </div>
            ` : ''}
          </div>
          <div class="px-6 pb-6 flex gap-3 mt-auto">
            <button class="view-field-btn flex-1 py-2.5 text-sm font-bold rounded-xl bg-green-50 text-green-700 hover:bg-green-700 hover:text-white transition-all" data-id="${field.id}">
              <i class="fas fa-eye mr-1"></i> Details
            </button>
            <button class="edit-field-btn flex-1 py-2.5 text-sm font-bold rounded-xl bg-blue-50 text-blue-700 hover:bg-blue-700 hover:text-white transition-all" data-id="${field.id}">
              <i class="fas fa-edit mr-1"></i> Edit
            </button>
            <button class="delete-field-btn flex-1 py-2.5 text-sm font-bold rounded-xl bg-red-50 text-red-600 hover:bg-red-700 hover:text-white transition-all" data-id="${field.id}">
              <i class="fas fa-trash mr-1"></i> Delete
            </button>
          </div>
        </div>
      `;
    });

    container.html(html);

    // Bind events
    $('.view-field-btn').off('click').on('click', function() {
      viewFieldDetails($(this).data('id'));
    });
    $('.edit-field-btn').off('click').on('click', function() {
      openFieldModal($(this).data('id'));
    });
    $('.delete-field-btn').off('click').on('click', function() {
      deleteField($(this).data('id'));
    });
  }

  // Map initialization
  function initMapInModal(locationData = null) {
    if (mapInstance) mapInstance.remove();

    let lat = 7.8731, lng = 80.7718; // Default Sri Lanka

    if (locationData) {
      if (typeof locationData === 'object') {
        lng = parseFloat(locationData.x || locationData.lng || locationData.longitude || lng);
        lat = parseFloat(locationData.y || locationData.lat || locationData.latitude || lat);
      } else if (typeof locationData === 'string' && locationData.includes(',')) {
        const parts = locationData.split(',');
        lat = parseFloat(parts[0]);
        lng = parseFloat(parts[1]);
      }
    }

    if (isNaN(lat)) lat = 7.8731;
    if (isNaN(lng)) lng = 80.7718;

    mapInstance = L.map('mapModal').setView([lat, lng], 14);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap contributors',
      maxZoom: 19
    }).addTo(mapInstance);

    if (activeMarker) activeMarker.remove();
    activeMarker = L.marker([lat, lng]).addTo(mapInstance).bindPopup('📍 Field Location').openPopup();

    $('#modal-loc-x').val(lng);
    $('#modal-loc-y').val(lat);
    $('#modal-loc-info').html(`<i class="fas fa-crosshairs text-green-600"></i> Longitude: ${lng.toFixed(5)}, Latitude: ${lat.toFixed(5)}`);

    mapInstance.on('click', (e) => {
      if (activeMarker) activeMarker.setLatLng(e.latlng);
      else activeMarker = L.marker(e.latlng).addTo(mapInstance);
      $('#modal-loc-x').val(e.latlng.lng);
      $('#modal-loc-y').val(e.latlng.lat);
      $('#modal-loc-info').html(`<i class="fas fa-location-dot text-green-600"></i> Longitude: ${e.latlng.lng.toFixed(5)}, Latitude: ${e.latlng.lat.toFixed(5)}`);
      reverseGeocode(e.latlng.lat, e.latlng.lng);
    });
  }

  async function reverseGeocode(lat, lng) {
    try {
      const resp = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}&zoom=18`);
      const data = await resp.json();
      if (data.display_name) $('#field-location-input').val(data.display_name);
    } catch (e) {
      console.warn('Geocoding error:', e);
    }
  }

  // Image gallery
  function updateImageGallery() {
    const gallery = $('#modal-image-gallery');
    if (tempImages.length === 0) {
      gallery.html('<div class="text-gray-400 text-center py-5 text-sm">📸 No images yet. Upload field photos.</div>');
      return;
    }
    let html = '';
    tempImages.forEach((img, idx) => {
      html += `
        <div class="image-container">
          <img src="${img}" class="image-preview">
          <div class="remove-image" onclick="window.removeImage(${idx})">×</div>
        </div>
      `;
    });
    gallery.html(html);
  }

  window.removeImage = function(idx) {
    tempImages.splice(idx, 1);
    updateImageGallery();
  };

  // Open modal for create/edit
  async function openFieldModal(id = null) {
    const isEdit = !!id;
    let field = null;

    if (isEdit) {
      field = fields.find(f => f.id === id);
      if (!field) {
        Swal.fire('Error', 'Field not found', 'error');
        return;
      }
      try {
        tempImages = field.images ? JSON.parse(field.images) : [];
        if (!Array.isArray(tempImages)) tempImages = [];
      } catch (e) {
        tempImages = [];
      }
    } else {
      tempImages = [];
    }

    // Prepare location values for modal
    let locX = '', locY = '', locationAddress = '';
    if (isEdit && field.location) {
      if (typeof field.location === 'object') {
        locX = field.location.x || field.location.lng || '';
        locY = field.location.y || field.location.lat || '';
      } else if (typeof field.location === 'string') {
        locationAddress = field.location;
      }
    }

    const { value: formData } = await Swal.fire({
      title: isEdit ? '<i class="fas fa-pen-square text-green-600"></i> Edit Field' : '<i class="fas fa-plus-circle text-green-600"></i> Create New Field',
      html: `
        <div class="text-left max-h-[70vh] overflow-y-auto px-1">
          <div class="mb-3">
            <label class="font-bold text-gray-700">📸 Field Images</label>
            <input type="file" id="modal-images-input" multiple accept="image/*" class="modal-input">
            <div id="modal-image-gallery" class="image-gallery-scroll"></div>
          </div>
          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="font-semibold text-gray-700">Field Name *</label>
              <input id="modal-name" class="modal-input" placeholder="Enter field name" value="${isEdit ? escapeHtml(safeString(field.name)) : ''}">
            </div>
            <div>
              <label class="font-semibold text-gray-700">Status</label>
              <select id="modal-status" class="modal-select">
                <option value="ACTIVE" ${isEdit && field.status === 'ACTIVE' ? 'selected' : ''}>✅ Active</option>
                <option value="INACTIVE" ${isEdit && field.status === 'INACTIVE' ? 'selected' : ''}>⏸️ Inactive</option>
                <option value="MAINTENANCE" ${isEdit && field.status === 'MAINTENANCE' ? 'selected' : ''}>🔧 Maintenance</option>
              </select>
            </div>
          </div>
          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="font-semibold text-gray-700">Area</label>
              <input id="modal-area" type="number" step="0.01" class="modal-input" placeholder="0.00" value="${isEdit ? (field.area || '') : ''}">
            </div>
            <div>
              <label class="font-semibold text-gray-700">Unit</label>
              <select id="modal-area-unit" class="modal-select">
                <option value="acres" ${isEdit && field.areaUnit === 'acres' ? 'selected' : ''}>Acres</option>
                <option value="hectares" ${isEdit && field.areaUnit === 'hectares' ? 'selected' : ''}>Hectares</option>
                <option value="sqm" ${isEdit && field.areaUnit === 'sqm' ? 'selected' : ''}>Square Meters</option>
              </select>
            </div>
          </div>
          <div>
            <label class="font-semibold text-gray-700">📍 Location Address</label>
            <input id="field-location-input" class="modal-input" placeholder="Address (auto-filled from map)" value="${isEdit ? escapeHtml(safeString(locationAddress)) : ''}">
          </div>
          <div>
            <label class="font-semibold text-gray-700">🗺️ Coordinates — click map to set</label>
            <div class="grid grid-cols-2 gap-3">
              <input id="modal-loc-x" class="modal-input bg-gray-50" readonly placeholder="Longitude (X)" value="${isEdit ? locX : ''}">
              <input id="modal-loc-y" class="modal-input bg-gray-50" readonly placeholder="Latitude (Y)" value="${isEdit ? locY : ''}">
            </div>
            <div id="modal-loc-info" class="location-info-card"></div>
            <div id="mapModal" style="height:280px; border-radius:20px;"></div>
          </div>
          <div>
            <label class="font-semibold text-gray-700">📝 Description</label>
            <textarea id="modal-description" rows="3" class="modal-textarea" placeholder="Field description, soil type, crops, etc.">${isEdit ? escapeHtml(safeString(field.description)) : ''}</textarea>
          </div>
        </div>
      `,
      width: '900px',
      showCancelButton: true,
      confirmButtonText: isEdit ? '💾 Update Field' : '🌾 Create Field',
      confirmButtonColor: '#15803d',
      cancelButtonColor: '#6c757d',
      didOpen: () => {
        setTimeout(() => {
          initMapInModal(isEdit ? field?.location : null);
        }, 100);
        updateImageGallery();

        $('#modal-images-input').on('change', function() {
          const files = Array.from(this.files);
          files.forEach(file => {
            if (!file.type.startsWith('image/')) {
              Swal.fire('Invalid File', 'Please upload only image files.', 'warning');
              return;
            }
            if (file.size > 5 * 1024 * 1024) {
              Swal.fire('File Too Large', 'Image size must be under 5 MB.', 'warning');
              return;
            }
            const reader = new FileReader();
            reader.onload = (e) => {
              tempImages.push(e.target.result);
              updateImageGallery();
            };
            reader.readAsDataURL(file);
          });
          $(this).val('');
        });
      },
      preConfirm: () => {
        const name = $('#modal-name').val()?.trim();
        if (!name) {
          Swal.showValidationMessage('Field name is required');
          return false;
        }

        const locX = parseFloat($('#modal-loc-x').val());
        const locY = parseFloat($('#modal-loc-y').val());
        if (isNaN(locX) || isNaN(locY)) {
          Swal.showValidationMessage('Please click the map to set a location');
          return false;
        }

        return {
          id: isEdit ? field.id : null,
          name: name,
          area: parseFloat($('#modal-area').val()) || 0,
          areaUnit: $('#modal-area-unit').val(),
          status: $('#modal-status').val(),
          location: { x: locX, y: locY },
          locationAddress: $('#field-location-input').val() || '',
          description: $('#modal-description').val() || '',
          images: JSON.stringify(tempImages)
        };
      }
    });

    if (formData) {
      if (isEdit) {
        await updateField(formData.id, formData);
      } else {
        await createField(formData);
      }
    }
  }

  // Delete with confirmation
  async function deleteField(id) {
    const result = await Swal.fire({
      title: 'Delete Field?',
      text: 'This action cannot be undone. All field data will be permanently removed.',
      icon: 'warning',
      showCancelButton: true,
      confirmButtonColor: '#dc2626',
      confirmButtonText: 'Yes, delete permanently',
      cancelButtonText: 'Cancel'
    });
    if (result.isConfirmed) {
      await deleteFieldById(id);
    }
  }

  // View field details
  function viewFieldDetails(id) {
    const field = fields.find(f => f.id === id);
    if (!field) return;

    let imagesArr = [];
    try {
      const parsed = JSON.parse(field.images || '[]');
      imagesArr = Array.isArray(parsed) ? parsed : [];
    } catch (e) {}

    let locationDisplay = 'Not specified';
    if (field.location) {
      if (typeof field.location === 'object') {
        locationDisplay = `Longitude: ${field.location.x}, Latitude: ${field.location.y}`;
      } else {
        locationDisplay = field.location;
      }
    }

    const imgsHtml = imagesArr.length ?
            `<div class="grid grid-cols-3 gap-3 mt-4">
        ${imagesArr.map(img => `<img src="${img}" class="rounded-xl h-28 w-full object-cover shadow-md cursor-pointer hover:opacity-90" onclick="window.open('${img}','_blank')">`).join('')}
      </div>` :
            '<p class="text-gray-400 text-sm mt-2">No images uploaded for this field.</p>';

    const statusColor = field.status === 'ACTIVE' ? 'bg-green-100 text-green-700' :
            field.status === 'MAINTENANCE' ? 'bg-yellow-100 text-yellow-700' :
                    'bg-gray-100 text-gray-700';

    Swal.fire({
      title: `<i class="fa-solid fa-tractor"></i> ${escapeHtml(field.name)}`,
      html: `
        <div class="text-left">
          <div class="bg-gray-50 p-4 rounded-2xl">
            <p><strong>Status:</strong>
              <span class="inline-block px-3 py-1 rounded-full text-xs font-bold ${statusColor}">${field.status}</span>
            </p>
            <p class="mt-2"><strong>Area:</strong> ${field.area || 0} ${field.areaUnit || 'acres'}</p>
            <p><strong>Location:</strong> ${escapeHtml(locationDisplay)}</p>
            ${field.locationAddress ? `<p><strong>Address:</strong> ${escapeHtml(field.locationAddress)}</p>` : ''}
            <p class="mt-2"><strong>Description:</strong><br>${escapeHtml(safeString(field.description)) || 'No description provided'}</p>
          </div>
          ${imgsHtml}
        </div>`,
      width: '650px',
      confirmButtonText: 'Close',
      confirmButtonColor: '#15803d',
      showCloseButton: true
    });
  }

  // Initialize on page load
  $(document).ready(() => {
    fetchFields();

    // Filter buttons
    $('.filter-btn').on('click', function() {
      currentFilter = $(this).data('filter');
      $('.filter-btn').removeClass('bg-green-700 text-white').addClass('bg-gray-100 text-gray-700');
      $(this).removeClass('bg-gray-100 text-gray-700').addClass('bg-green-700 text-white');
      renderFields();
    });

    // Search input
    $('#fieldSearch').on('input', function() {
      currentSearch = $(this).val();
      renderFields();
    });

    // Add button
    $('#addFieldBtn').on('click', () => openFieldModal());
  });
</script>
</body>
</html>
