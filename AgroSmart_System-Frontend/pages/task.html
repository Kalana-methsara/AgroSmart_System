<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>AgroSmart | Professional Task Management</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    * {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
    }

    @keyframes fadeSlideUp {
      from {
        opacity: 0;
        transform: translateY(12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .task-card {
      animation: fadeSlideUp 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      transition: all 0.25s ease;
    }

    .task-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 20px 25px -12px rgba(0, 0, 0, 0.1), 0 4px 8px -4px rgba(0, 0, 0, 0.02);
    }

    .badge-modern {
      backdrop-filter: blur(2px);
      font-weight: 500;
      letter-spacing: 0.01em;
    }

    .badge-pending {
      background: #fffbeb;
      color: #b45309;
      border-left: 3px solid #f59e0b;
    }

    .badge-completed {
      background: #f0fdf4;
      color: #166534;
      border-left: 3px solid #22c55e;
    }

    .badge-overdue {
      background: #fef2f2;
      color: #991b1b;
      border-left: 3px solid #ef4444;
    }

    .glass-stat-card {
      background: rgba(255,255,255,0.75);
      backdrop-filter: blur(4px);
      border: 1px solid rgba(255,255,255,0.6);
      transition: all 0.2s;
    }

    .filter-input:focus {
      box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.2);
      border-color: #22c55e;
      outline: none;
    }

    .btn-primary {
      background: linear-gradient(105deg, #166534 0%, #15803d 100%);
      box-shadow: 0 4px 8px -2px rgba(21, 128, 61, 0.25);
      transition: all 0.2s;
    }

    .btn-primary:hover {
      background: linear-gradient(105deg, #14532d 0%, #166534 100%);
      transform: translateY(-1px);
      box-shadow: 0 8px 16px -4px rgba(21, 128, 61, 0.3);
    }

    .action-btn {
      transition: all 0.2s;
    }

    .action-btn:active {
      transform: scale(0.96);
    }

    .task-id-badge {
      font-family: 'SF Mono', 'Monaco', monospace;
      font-size: 10px;
      background: #f3f4f6;
      padding: 2px 6px;
      border-radius: 6px;
      color: #4b5563;
    }
  </style>
</head>
<body class="antialiased">

<div class=" mx-auto px-4 sm:px-6 lg:px-8 py-8 md:py-10">
  <!-- Enhanced Header Section -->
  <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-5 mb-8">
    <h2 class="text-2xl font-bold text-gray-800">Task Management</h2>
    <button id="createTaskBtn"
            class="btn-primary text-white px-6 py-2.5 rounded-xl flex items-center gap-2.5 font-semibold shadow-md transition-all duration-200">
      <i class="fa-solid fa-plus text-sm"></i> New Task
    </button>
  </div>

  <!-- Stats Dashboard & Filters -->
  <div class="bg-white/80 backdrop-blur-sm rounded-2xl shadow-lg border border-white/60 p-5 mb-7 transition-all">
    <div class="flex flex-col lg:flex-row lg:items-center lg:justify-between gap-5">
      <div class="flex flex-wrap items-center gap-3">
        <div class="relative">
          <i class="fa-solid fa-magnifying-glass absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
          <input type="text" id="searchTaskInput"
                 placeholder="Search by task ID, name or crop..."
                 class="pl-10 pr-4 py-2.5 border border-gray-200 rounded-xl w-64 text-sm focus:border-green-400 filter-input transition bg-white shadow-sm">
        </div>
        <div class="relative">
          <i class="fa-solid fa-filter absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-400 text-xs"></i>
          <select id="filterStatus" class="pl-9 pr-8 py-2.5 border border-gray-200 rounded-xl text-sm bg-white cursor-pointer shadow-sm focus:border-green-400 transition">
            <option value="ALL">📋 All status</option>
            <option value="PENDING">⏳ Pending</option>
            <option value="COMPLETED">✅ Completed</option>
            <option value="OVERDUE">⚠️ Overdue</option>
          </select>
        </div>
        <button id="refreshTasksBtn"
                class="text-gray-500 hover:text-green-700 bg-gray-50 hover:bg-green-50 px-3.5 py-2.5 rounded-xl transition-all flex items-center gap-2 text-sm font-medium">
          <i class="fa-solid fa-arrows-rotate text-xs"></i> Refresh
        </button>
      </div>

      <div class="flex gap-3">
        <div class="glass-stat-card rounded-xl px-4 py-2.5 flex items-center gap-2 shadow-sm">
          <div class="w-8 h-8 rounded-lg bg-gray-100 flex items-center justify-center">
            <i class="fa-solid fa-list-check text-green-700 text-sm"></i>
          </div>
          <div>
            <p class="text-xs text-gray-500 font-medium">Total</p>
            <p class="text-xl font-bold text-gray-800 leading-5" id="totalCount">0</p>
          </div>
        </div>
        <div class="glass-stat-card rounded-xl px-4 py-2.5 flex items-center gap-2 shadow-sm">
          <div class="w-8 h-8 rounded-lg bg-amber-50 flex items-center justify-center">
            <i class="fa-regular fa-hourglass-half text-amber-600 text-sm"></i>
          </div>
          <div>
            <p class="text-xs text-gray-500 font-medium">Pending</p>
            <p class="text-xl font-bold text-amber-700 leading-5" id="pendingCount">0</p>
          </div>
        </div>
        <div class="glass-stat-card rounded-xl px-4 py-2.5 flex items-center gap-2 shadow-sm">
          <div class="w-8 h-8 rounded-lg bg-emerald-50 flex items-center justify-center">
            <i class="fa-solid fa-check-circle text-emerald-600 text-sm"></i>
          </div>
          <div>
            <p class="text-xs text-gray-500 font-medium">Completed</p>
            <p class="text-xl font-bold text-emerald-700 leading-5" id="completedCount">0</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Task Cards Grid -->
  <div id="tasksGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 auto-rows-fr">
    <div class="col-span-full flex justify-center items-center py-16">
      <div class="bg-white/60 backdrop-blur rounded-2xl px-8 py-6 shadow-sm flex flex-col items-center">
        <i class="fa-solid fa-spinner fa-pulse text-3xl text-green-600 mb-3"></i>
        <p class="text-gray-500 font-medium">Loading your tasks...</p>
      </div>
    </div>
  </div>
</div>

<script>
  // API Configuration
  const API_BASE = 'http://localhost:8080/api/v1/planting-task';
  let allTasks = [];

  // Utility functions
  function formatDate(dateStr) {
    if (!dateStr) return '—';
    try {
      const d = new Date(dateStr);
      if (isNaN(d.getTime())) return dateStr;
      return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    } catch (e) {
      return dateStr;
    }
  }

  function formatDuration(duration) {
    if (duration == null) return '—';
    const hrs = parseFloat(duration);
    return `${hrs.toFixed(1)} hrs`;
  }

  function escapeHtml(str) {
    if (!str) return '';
    return String(str).replace(/[&<>]/g, m => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;'
    }[m]));
  }

  function getEnhancedStatusBadge(status) {
    const s = (status || 'PENDING').toUpperCase();
    if (s === 'COMPLETED') {
      return `<span class="badge-completed badge-modern px-3 py-1 rounded-full text-xs font-semibold flex items-center gap-1.5 shadow-sm"><i class="fa-regular fa-circle-check text-xs"></i> Completed</span>`;
    }
    if (s === 'OVERDUE') {
      return `<span class="badge-overdue badge-modern px-3 py-1 rounded-full text-xs font-semibold flex items-center gap-1.5 shadow-sm"><i class="fa-regular fa-calendar-xmark"></i> Overdue</span>`;
    }
    return `<span class="badge-pending badge-modern px-3 py-1 rounded-full text-xs font-semibold flex items-center gap-1.5 shadow-sm"><i class="fa-regular fa-hourglass-half"></i> Pending</span>`;
  }

  function renderTasks() {
    const searchTerm = $('#searchTaskInput').val().toLowerCase();
    const statusFilter = $('#filterStatus').val();

    let filtered = [...allTasks];

    if (searchTerm) {
      filtered = filtered.filter(task => {
        const taskIdStr = task.taskId ? String(task.taskId) : '';
        return (task.taskName && task.taskName.toLowerCase().includes(searchTerm)) ||
                (task.cropId && task.cropId.toLowerCase().includes(searchTerm)) ||
                (task.fieldCropId && task.fieldCropId.toLowerCase().includes(searchTerm)) ||
                (taskIdStr && taskIdStr.toLowerCase().includes(searchTerm));
      });
    }

    if (statusFilter !== 'ALL') {
      filtered = filtered.filter(task =>
              (task.status || 'PENDING').toUpperCase() === statusFilter
      );
    }

    // Update stats
    const total = allTasks.length;
    const pending = allTasks.filter(t => (t.status || 'PENDING').toUpperCase() === 'PENDING').length;
    const completed = allTasks.filter(t => (t.status || '').toUpperCase() === 'COMPLETED').length;
    $('#totalCount').text(total);
    $('#pendingCount').text(pending);
    $('#completedCount').text(completed);

    const grid = $('#tasksGrid');

    if (filtered.length === 0) {
      grid.html(`
        <div class="col-span-full">
          <div class="empty-state rounded-2xl border border-gray-100 shadow-sm p-12 text-center">
            <div class="inline-flex items-center justify-center w-20 h-20 bg-gradient-to-br from-gray-50 to-gray-100 rounded-2xl mb-5">
              <i class="fa-regular fa-clipboard text-3xl text-gray-400"></i>
            </div>
            <h3 class="text-lg font-semibold text-gray-700 mb-1">No tasks available</h3>
            <p class="text-sm text-gray-500 max-w-sm mx-auto">Create a new planting task to stay organized and boost productivity</p>
            <button id="emptyCreateBtn" class="mt-5 bg-green-700 hover:bg-green-800 text-white px-5 py-2 rounded-xl text-sm font-medium transition shadow-sm">
              <i class="fa-solid fa-plus mr-1.5"></i> Create your first task
            </button>
          </div>
        </div>
      `);
      $('#emptyCreateBtn').on('click', () => openCreateModal());
      return;
    }

    let html = '';
    filtered.forEach(task => {
      const taskId = task.taskId;
      const name = task.taskName || 'Unnamed Operation';
      const status = task.status || 'PENDING';
      const cropId = task.cropId || '—';
      const fieldCropId = task.fieldCropId || '—';
      const duration = formatDuration(task.calculatedDuration);
      const dueDateFormatted = formatDate(task.dueDate);
      const isOverdue = status === 'OVERDUE';

      html += `
        <div class="task-card bg-white rounded-2xl shadow-md hover:shadow-xl transition-all duration-300 border border-gray-100 flex flex-col overflow-hidden relative" data-task-id="${taskId}">
          <div class="gradient-border"></div>
          <div class="p-5 pb-3 flex-1">
            <div class="flex justify-between items-start gap-2 mb-2">
              <div class="flex-1">
                <div class="flex items-center gap-1.5 mb-1">
                  <i class="fa-solid fa-tractor text-green-600 text-xs"></i>
                  <h3 class="font-bold text-gray-800 text-md leading-tight line-clamp-2">${escapeHtml(name)}</h3>
                </div>
                <div class="flex items-center gap-2 mt-1">
                  <span class="task-id-badge">
                    <i class="fa-regular fa-hashtag text-gray-400 text-[9px] mr-1"></i>ID: ${taskId}
                  </span>
                </div>
              </div>
              ${getEnhancedStatusBadge(status)}
            </div>

            <div class="mt-3 space-y-2.5">
              <div class="flex items-center gap-2.5 text-xs text-gray-600">
                <i class="fa-regular fa-calendar-alt w-4 text-green-600"></i>
                <span class="font-mono text-gray-700">${escapeHtml(dueDateFormatted)}</span>
                ${isOverdue ? '<span class="text-red-500 text-[11px] font-medium bg-red-50 px-1.5 py-0.5 rounded-full">Delayed</span>' : ''}
              </div>
              <div class="flex items-center gap-2.5 text-xs">
                <i class="fa-solid fa-seedling w-4 text-emerald-600"></i>
                <span class="text-gray-600">Crop:</span>
                <code class="bg-gray-100 px-1.5 py-0.5 rounded text-gray-700 text-[11px] font-mono">${escapeHtml(cropId)}</code>
              </div>
              <div class="flex items-center gap-2.5 text-xs">
                <i class="fa-solid fa-map-pin w-4 text-amber-600"></i>
                <span class="text-gray-600">Field crop:</span>
                <code class="bg-gray-100 px-1.5 py-0.5 rounded text-gray-700 text-[11px] font-mono">${escapeHtml(fieldCropId)}</code>
              </div>
              <div class="flex items-center gap-2.5 text-xs border-t border-gray-50 pt-2 mt-1">
                <i class="fa-regular fa-clock w-4 text-blue-500"></i>
                <span class="text-gray-600">Est. duration:</span>
                <span class="font-medium text-gray-800">${duration}</span>
              </div>
            </div>
          </div>

          <div class="border-t border-gray-100 bg-gray-50/80 px-5 py-3 flex justify-between items-center mt-1">
            ${status !== 'COMPLETED' ? `
              <button class="complete-task-btn action-btn text-green-700 hover:text-white hover:bg-green-700 bg-green-50 px-3 py-1.5 rounded-lg text-xs font-medium transition-all flex items-center gap-1.5 shadow-sm" data-task-id="${taskId}">
                <i class="fa-regular fa-circle-check"></i> Complete
              </button>` : `
              <span class="text-green-700 bg-green-50 px-3 py-1.5 rounded-lg text-xs font-medium flex items-center gap-1.5">
                <i class="fa-solid fa-check-double"></i> Finished
              </span>`
      }
            <button class="delete-task-btn action-btn text-red-600 hover:text-white hover:bg-red-600 bg-red-50 px-3 py-1.5 rounded-lg text-xs font-medium transition-all flex items-center gap-1.5" data-task-id="${taskId}">
              <i class="fa-regular fa-trash-can"></i> Delete
            </button>
          </div>
        </div>
      `;
    });

    grid.html(html);

    // Bind events with proper taskId handling
    $('.complete-task-btn').click(function(e) {
      e.preventDefault();
      const taskId = $(this).data('task-id');
      if (taskId) {
        markTaskCompleted(taskId);
      } else {
        console.error('No taskId found for complete action');
        Swal.fire('Error', 'Invalid task identifier', 'error');
      }
    });

    $('.delete-task-btn').click(function(e) {
      e.preventDefault();
      const taskId = $(this).data('task-id');
      if (taskId) {
        deleteTask(taskId);
      } else {
        console.error('No taskId found for delete action');
        Swal.fire('Error', 'Invalid task identifier', 'error');
      }
    });
  }

  // API Calls with proper taskId handling
  async function fetchAllTasks() {
    try {
      const token = localStorage.getItem('token');
      if (!token) {
        Swal.fire({
          icon: 'warning',
          title: 'Session Required',
          text: 'Please log in to continue',
          confirmButtonColor: '#166534'
        }).then(() => window.location.href = '../index.html');
        return;
      }
      const res = await fetch(`${API_BASE}/all`, {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      const apiRes = await res.json();
      if (apiRes.code === 200 && Array.isArray(apiRes.data)) {
        allTasks = apiRes.data;
        updateOverdueStatusLocally();
        console.log('Tasks loaded successfully:', allTasks.length, 'tasks with IDs:', allTasks.map(t => t.taskId));
      } else {
        allTasks = [];
        console.warn('Unexpected response format', apiRes);
      }
      renderTasks();
    } catch (err) {
      console.error('Fetch error:', err);
      $('#tasksGrid').html(`<div class="col-span-full flex justify-center py-12"><div class="bg-red-50 border border-red-200 rounded-xl px-6 py-4 text-center shadow-sm"><i class="fa-solid fa-wifi text-red-500 text-xl mb-2 block"></i><p class="text-red-700 font-medium">Backend connection failed. Make sure server is running.</p><button id="retryFetch" class="mt-3 bg-red-100 hover:bg-red-200 text-red-800 px-4 py-1.5 rounded-lg text-sm">Retry</button></div></div>`);
      $('#retryFetch').on('click', () => fetchAllTasks());
    }
  }

  function updateOverdueStatusLocally() {
    const today = new Date().toISOString().split('T')[0];
    let changed = false;
    allTasks = allTasks.map(task => {
      if (task.status !== 'COMPLETED' && task.dueDate && task.dueDate < today && task.status !== 'OVERDUE') {
        task.status = 'OVERDUE';
        changed = true;
      }
      return task;
    });
    if (changed) renderTasks();
  }

  async function markTaskCompleted(taskId) {
    if (!taskId) {
      Swal.fire('Error', 'Task ID is required', 'error');
      return;
    }

    const confirm = await Swal.fire({
      title: 'Mark as completed?',
      text: `Task ID: ${taskId} will be marked as completed.`,
      icon: 'question',
      showCancelButton: true,
      confirmButtonText: 'Yes, complete',
      confirmButtonColor: '#15803d',
      cancelButtonColor: '#6b7280',
      background: '#ffffff',
      borderRadius: '1rem'
    });

    if (!confirm.isConfirmed) return;

    try {
      const token = localStorage.getItem('token');
      console.log(`Completing task with ID: ${taskId}`);

      const res = await fetch(`${API_BASE}/${taskId}/complete`, {
        method: 'PUT',
        headers: {
          'Authorization': `Bearer ${token}`,
          'Content-Type': 'application/json'
        }
      });

      const result = await res.json();

      if (res.ok && result.code === 200) {
        Swal.fire({
          title: 'Task completed!',
          text: `Task ${taskId} has been marked as completed.`,
          icon: 'success',
          confirmButtonColor: '#15803d',
          timer: 1800,
          timerProgressBar: true
        });
        fetchAllTasks();
      } else {
        throw new Error(result.message || 'Completion failed');
      }
    } catch (err) {
      console.error('Complete task error:', err);
      Swal.fire('Error', err.message || 'Unable to update task status', 'error');
    }
  }

  async function deleteTask(taskId) {
    if (!taskId) {
      Swal.fire('Error', 'Task ID is required', 'error');
      return;
    }

    const confirm = await Swal.fire({
      title: 'Delete task permanently?',
      text: `Task ID: ${taskId} will be permanently deleted. This action cannot be undone.`,
      icon: 'warning',
      showCancelButton: true,
      confirmButtonColor: '#dc2626',
      cancelButtonColor: '#6b7280',
      confirmButtonText: 'Yes, delete'
    });

    if (!confirm.isConfirmed) return;

    try {
      const token = localStorage.getItem('token');
      console.log(`Deleting task with ID: ${taskId}`);

      const res = await fetch(`${API_BASE}/${taskId}`, {
        method: 'DELETE',
        headers: { 'Authorization': `Bearer ${token}` }
      });

      const data = await res.json();

      if (res.ok && data.code === 200) {
        Swal.fire('Deleted!', `Task ${taskId} has been removed.`, 'success');
        fetchAllTasks();
      } else {
        throw new Error(data.message || 'Delete failed');
      }
    } catch (e) {
      console.error('Delete task error:', e);
      Swal.fire('Error', e.message, 'error');
    }
  }

  async function refreshAll() {
    await fetchAllTasks();
  }

  // Create Modal
  async function openCreateModal() {
    const { value: formData } = await Swal.fire({
      title: '<div class="text-xl font-bold text-gray-800">🌾 Schedule new task</div>',
      html: `
        <div class="text-left space-y-4 mt-2">
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1.5"><i class="fa-solid fa-pen-fancy text-green-600 mr-1"></i> Task name *</label>
            <input type="text" id="taskName" class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:ring-2 focus:ring-green-300 transition" placeholder="e.g., Fertilizer application - Phase 2">
          </div>
          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="block text-sm font-semibold text-gray-700 mb-1.5"><i class="fa-regular fa-calendar"></i> Due date *</label>
              <input type="date" id="dueDate" class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:ring-2 focus:ring-green-300">
            </div>
            <div>
              <label class="block text-sm font-semibold text-gray-700 mb-1.5"><i class="fa-regular fa-hourglass"></i> Duration (hrs)</label>
              <input type="number" id="duration" step="0.5" class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm" placeholder="e.g., 3.5">
            </div>
          </div>
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1.5"><i class="fa-solid fa-layer-group text-amber-600"></i> Field Crop ID *</label>
            <input type="text" id="fieldCropId" class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm" placeholder="e.g., FC-9872">
          </div>
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1.5"><i class="fa-solid fa-seedling"></i> Crop ID (optional)</label>
            <input type="text" id="cropId" class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm" placeholder="e.g., RICE-001">
          </div>
          <div class="text-xs text-gray-400 bg-gray-50 p-2 rounded-lg">
            <i class="fa-regular fa-lightbulb"></i> Note: Task ID will be auto-generated by the system
          </div>
        </div>
      `,
      focusConfirm: false,
      width: '540px',
      showCancelButton: true,
      confirmButtonText: '<i class="fa-regular fa-save mr-1"></i> Create task',
      confirmButtonColor: '#166534',
      cancelButtonText: 'Cancel',
      preConfirm: () => {
        const taskName = document.getElementById('taskName').value.trim();
        const dueDate = document.getElementById('dueDate').value;
        const duration = document.getElementById('duration').value;
        const fieldCropId = document.getElementById('fieldCropId').value.trim();
        const cropId = document.getElementById('cropId').value.trim();
        if (!taskName) { Swal.showValidationMessage('Task name is required'); return false; }
        if (!dueDate) { Swal.showValidationMessage('Due date is required'); return false; }
        if (!fieldCropId) { Swal.showValidationMessage('Field Crop ID is required'); return false; }
        return {
          taskName,
          dueDate,
          calculatedDuration: duration ? parseFloat(duration) : null,
          fieldCropId,
          cropId: cropId || null,
          status: 'PENDING'
        };
      }
    });

    if (!formData) return;

    try {
      const token = localStorage.getItem('token');
      const res = await fetch(API_BASE, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${token}`
        },
        body: JSON.stringify(formData)
      });
      const result = await res.json();
      if (res.ok && (result.code === 200 || result.code === 201)) {
        Swal.fire({
          title: 'Task created!',
          text: result.data?.taskId ? `Task ID: ${result.data.taskId} has been scheduled.` : 'Your new planting task has been scheduled.',
          icon: 'success',
          confirmButtonColor: '#166534'
        });
        fetchAllTasks();
      } else {
        throw new Error(result.message || 'Creation failed');
      }
    } catch (err) {
      console.error('Create task error:', err);
      Swal.fire('Creation error', err.message || 'Could not save task', 'error');
    }
  }

  // Event binding and initial load
  $(document).ready(async () => {
    const token = localStorage.getItem('token');
    if (!token) {
      Swal.fire({
        title: 'Access Denied',
        text: 'Please login to access AgroSmart tasks',
        icon: 'error',
        confirmButtonText: 'Go to login'
      }).then(() => window.location.href = '../index.html');
      return;
    }
    await refreshAll();
    $('#searchTaskInput').on('input', () => renderTasks());
    $('#filterStatus').on('change', () => renderTasks());
    $('#refreshTasksBtn').click(() => refreshAll());
    $('#createTaskBtn').click(() => openCreateModal());
  });
</script>
</body>
</html>
