<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AgroSmart - Professional Profile</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes slideInRight {
      from { opacity: 0; transform: translateX(30px); }
      to { opacity: 1; transform: translateX(0); }
    }
    .animate-fadeInUp  { animation: fadeInUp 0.5s ease-out; }
    .animate-slideInRight { animation: slideInRight 0.5s ease-out; }

    .profile-card { transition: all 0.3s ease; }
    .profile-card:hover { transform: translateY(-5px); box-shadow: 0 20px 25px -5px rgba(0,0,0,.1), 0 10px 10px -5px rgba(0,0,0,.04); }

    .stat-card { transition: all 0.3s ease; cursor: pointer; }
    .stat-card:hover { transform: translateY(-3px); background: linear-gradient(135deg,#f0fdf4,#dcfce7); }

    .profile-image-container { position: relative; display: inline-block; }
    .profile-image-overlay {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.5); border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; transition: opacity 0.3s ease; cursor: pointer;
    }
    .profile-image-container:hover .profile-image-overlay { opacity: 1; }
  </style>
</head>
<body class="bg-gradient-to-br from-gray-50 to-gray-100 font-sans antialiased">

<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">

  <!-- Header -->
  <div class="mb-8 animate-fadeInUp">
    <div class="flex items-center justify-between">
      <div>
        <h1 class="text-3xl font-bold text-gray-900">My Profile</h1>
        <p class="text-gray-600 mt-1">Manage your personal information and farming preferences</p>
      </div>
      <div class="flex items-center space-x-3">
        <button id="editProfileBtn"
                class="bg-gradient-to-r from-green-600 to-green-700 text-white px-6 py-2.5 rounded-xl hover:shadow-lg transition-all duration-300 flex items-center space-x-2">
          <i class="fas fa-edit"></i><span>Edit Profile</span>
        </button>
        <button id="deleteAccountBtn"
                class="bg-gradient-to-r from-red-500 to-red-600 text-white px-6 py-2.5 rounded-xl hover:shadow-lg transition-all duration-300 flex items-center space-x-2">
          <i class="fas fa-trash"></i><span>Delete Account</span>
        </button>
      </div>
    </div>
  </div>

  <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">

    <!-- Left Column -->
    <div class="lg:col-span-1 animate-fadeInUp">
      <div class="bg-white rounded-2xl shadow-xl overflow-hidden profile-card">
        <div class="bg-gradient-to-r from-green-700 to-green-600 h-32"></div>
        <div class="relative px-6 pb-6">
          <div class="flex justify-center -mt-16 mb-4">
            <div class="profile-image-container">
              <img id="profileImage"
                   src="https://ui-avatars.com/api/?background=16a34a&color=fff&size=120&bold=true&name=User"
                   alt="Profile" class="w-32 h-32 rounded-full border-4 border-white shadow-lg">
              <div class="profile-image-overlay" id="changePhotoBtn">
                <i class="fas fa-camera text-white text-2xl"></i>
              </div>
            </div>
          </div>

          <div class="text-center mb-6">
            <h2 id="fullNameDisplay" class="text-2xl font-bold text-gray-900">—</h2>
            <p id="roleDisplay" class="text-green-600 font-medium mt-1">—</p>
            <p class="text-sm text-gray-500 mt-2">Member since 2024</p>
          </div>

          <hr class="my-6 border-gray-200">

          <div class="grid grid-cols-2 gap-4">
            <div class="text-center p-3 bg-green-50 rounded-xl stat-card">
              <i class="fas fa-seedling text-green-600 text-xl mb-2"></i>
              <p class="text-2xl font-bold text-gray-900">12</p>
              <p class="text-xs text-gray-600">Active Crops</p>
            </div>
            <div class="text-center p-3 bg-blue-50 rounded-xl stat-card">
              <i class="fas fa-chart-line text-blue-600 text-xl mb-2"></i>
              <p class="text-2xl font-bold text-gray-900">15.2</p>
              <p class="text-xs text-gray-600">Yield (tons)</p>
            </div>
            <div class="text-center p-3 bg-yellow-50 rounded-xl stat-card">
              <i class="fas fa-tasks text-yellow-600 text-xl mb-2"></i>
              <p class="text-2xl font-bold text-gray-900">8</p>
              <p class="text-xs text-gray-600">Pending Tasks</p>
            </div>
            <div class="text-center p-3 bg-purple-50 rounded-xl stat-card">
              <i class="fas fa-star text-purple-600 text-xl mb-2"></i>
              <p class="text-2xl font-bold text-gray-900">5</p>
              <p class="text-xs text-gray-600">Years Exp.</p>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Right Column -->
    <div class="lg:col-span-2 space-y-6 animate-slideInRight">
      <div id="userTab" class="bg-white rounded-2xl shadow-xl p-6">
        <h3 class="text-xl font-bold text-gray-900 mb-6">User Information</h3>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

          <!-- Username -->
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Username</label>
            <div class="view-field"><p id="viewUsername" class="text-gray-900 py-2">—</p></div>
            <div class="edit-field hidden">
              <input type="text" id="editUsername"
                     class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500">
            </div>
          </div>

          <!-- Email -->
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Email</label>
            <div class="view-field"><p id="viewEmail" class="text-gray-900 py-2">—</p></div>
            <div class="edit-field hidden">
              <input type="email" id="editEmail"
                     class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500">
            </div>
          </div>

          <!-- Password -->
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">New Password</label>
            <div class="view-field"><p class="text-gray-500 py-2">••••••••</p></div>
            <div class="edit-field hidden">
              <input type="password" id="editPassword" placeholder="Leave blank to keep current"
                     class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500">
            </div>
          </div>

          <!-- Role -->
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Role</label>
            <div class="view-field"><p id="viewRole" class="text-gray-900 py-2">—</p></div>
            <div class="edit-field hidden">
              <select id="editRole"
                      class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500">
                <option value="ADMIN">ADMIN</option>
                <option value="USER">USER</option>
              </select>
            </div>
          </div>

        </div>
      </div>

      <!-- Action Buttons -->
      <div class="flex justify-end space-x-3">
        <button id="cancelEditBtn"
                class="px-6 py-2 border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-50 transition hidden">
          Cancel
        </button>
        <button id="saveProfileBtn"
                class="px-6 py-2 bg-gradient-to-r from-green-600 to-green-700 text-white rounded-lg hover:shadow-lg transition hidden">
          Save Changes
        </button>
      </div>
    </div>
  </div>
</div>
<script>
  const BASE_URL = "http://localhost:8080/api/v1/user";
  let currentUser = null;

  $(document).ready(function () {

    function getAuthToken() {
      return localStorage.getItem('token');
    }

    function loadUser() {
      const userIdentifier = localStorage.getItem("userIdentifier");
      const token = getAuthToken();

      if (!userIdentifier || !token) {
        Swal.fire("Error", "User not logged in.", "error");
        return;
      }

      $.ajax({
        url: `${BASE_URL}/${userIdentifier}`,
        headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
        method: "GET",
        success: function (res) {
          currentUser = res.data;
          renderUser();
        },
        error: function () {
          Swal.fire("Error", "Could not fetch user profile.", "error");
        }
      });
    }

    function renderUser() {
      if (!currentUser) return;

      $('#viewUsername').text(currentUser.username);
      $('#viewEmail').text(currentUser.email);
      $('#viewRole').text(currentUser.role);
      $('#fullNameDisplay').text(currentUser.username);
      $('#roleDisplay').text(currentUser.role);
      $('#profileImage').attr('src',
              `https://ui-avatars.com/api/?background=16a34a&color=fff&size=120&bold=true&name=${encodeURIComponent(currentUser.username)}`
      );
    }

    loadUser();

    $('#editProfileBtn').click(function () {
      if (!currentUser) {
        Swal.fire("Please wait", "User data is still loading.", "info");
        return;
      }
      $('#editUsername').val(currentUser.username);
      $('#editEmail').val(currentUser.email);
      $('#editRole').val(currentUser.role);
      $('#editPassword').val("");

      $('.view-field').addClass('hidden');
      $('.edit-field').removeClass('hidden');
      $('#editProfileBtn, #deleteAccountBtn').addClass('hidden');
      $('#cancelEditBtn, #saveProfileBtn').removeClass('hidden');
    });

    $('#cancelEditBtn').click(function () {
      $('.view-field').removeClass('hidden');
      $('.edit-field').addClass('hidden');
      $('#editProfileBtn, #deleteAccountBtn').removeClass('hidden');
      $('#cancelEditBtn, #saveProfileBtn').addClass('hidden');
    });

    $('#saveProfileBtn').click(function () {
      const token = getAuthToken();
      if (!token) return Swal.fire("Error", "Not authorized", "error");

      const updatedUser = {
        id: currentUser.id,
        username: $('#editUsername').val().trim(),
        email: $('#editEmail').val().trim(),
        role: $('#editRole').val()
      };

      const newPassword = $('#editPassword').val();
      if (newPassword) updatedUser.password = newPassword;

      $.ajax({
        url: BASE_URL,
        method: "PUT",
        headers: { 'Authorization': `Bearer ${token}` },
        contentType: "application/json",
        data: JSON.stringify(updatedUser),
        success: function () {
          Swal.fire({ icon: 'success', title: 'Profile Updated', timer: 1500, showConfirmButton: false });
          loadUser();
          $('#cancelEditBtn').click();
        },
        error: function (xhr) {
          const msg = xhr.responseJSON?.message || "Update failed. Please try again.";
          Swal.fire("Update Error", msg, "error");
        }
      });
    });

    $('#deleteAccountBtn').click(function () {
      const token = getAuthToken();
      if (!token) return Swal.fire("Error", "Not authorized", "error");

      Swal.fire({
        title: 'Are you sure?',
        text: "This will permanently delete your AgroSmart account!",
        icon: 'warning',
        showCancelButton: true,
        confirmButtonColor: '#ef4444',
        cancelButtonColor: '#6b7280',
        confirmButtonText: 'Yes, delete it'
      }).then((result) => {
        if (result.isConfirmed) {
          $.ajax({
            url: `${BASE_URL}/${currentUser.id}`,
            method: "DELETE",
            headers: { 'Authorization': `Bearer ${token}` },
            success: function () {
              Swal.fire("Deleted!", "Your account has been removed.", "success");
              setTimeout(() => { window.location.href = "login.html"; }, 2000);
            },
            error: function () {
              Swal.fire("Error", "Could not delete account. Try again later.", "error");
            }
          });
        }
      });
    });

  });
</script>
</body>
</html>
