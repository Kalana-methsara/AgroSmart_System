<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>AgroSmart · Crop Management Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        @keyframes slideIn {
            from { transform: translateX(-10px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        @keyframes pulseGreen {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.05); }
        }
        .animate-slide-in { animation: slideIn 0.3s ease-out; }
        .sidebar-item { transition: all 0.2s; }
        .sidebar-item:hover:not(.active) { background-color: rgba(34, 197, 94, 0.1); color: #166534; }
        .sidebar-item.active { background-color: #166534; color: white; box-shadow: 0 4px 8px rgba(0,0,0,0.05); }
        .card-hover { transition: transform 0.2s, box-shadow 0.2s; }
        .card-hover:hover { transform: translateY(-2px); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04); }
        .weather-glow { background: linear-gradient(145deg, #fbbf24, #f59e0b); box-shadow: 0 10px 15px -3px rgba(245, 158, 11, 0.2); }
        .mobile-menu { transition: transform 0.3s ease-in-out; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #a8a8a8; }
        .crop-card {
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .crop-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 25px -12px rgba(0, 0, 0, 0.2);
        }
        .filter-active {
            background-color: #166534 !important;
            color: white !important;
        }
        .water-drops i {
            color: #3b82f6;
        }
        .temp-badge {
            background: linear-gradient(135deg, #f59e0b, #dc2626);
        }
        .crop-img-placeholder {
            background: linear-gradient(135deg, #fef3c7, #fde68a);
        }
        .btn-primary {
            background-color: #166534;
            transition: all 0.2s;
        }
        .btn-primary:hover {
            background-color: #14532d;
            transform: translateY(-1px);
        }
        .modal-input {
            width: 100%;
            padding: 0.75rem;
            margin-top: 0.5rem;
            margin-bottom: 1rem;
            border: 1px solid #e2e8f0;
            border-radius: 0.5rem;
            font-size: 0.95rem;
        }
        .modal-input:focus {
            outline: none;
            border-color: #166534;
            ring: 2px solid #166534;
        }
        .action-btn {
            transition: all 0.2s;
        }
        .action-btn:hover {
            transform: scale(1.05);
        }
        .toast-success {
            background: #166534;
        }
    </style>
</head>
<body class="bg-gray-50 font-sans antialiased">

<!-- Loading Overlay -->
<div id="loadingOverlay" class="fixed inset-0 bg-black bg-opacity-50 z-50 hidden items-center justify-center">
    <div class="bg-white rounded-2xl p-8 shadow-2xl flex flex-col items-center">
        <div class="w-20 h-20 border-4 border-green-200 border-t-green-600 rounded-full animate-spin mb-4"></div>
        <p class="text-gray-700 font-medium">Loading AgroSmart...</p>
    </div>
</div>

<!-- Main Content -->
<main class="min-h-screen p-6 md:p-10">
    <!-- Header with Add Crop Button -->

    <!-- Crops Library Section -->
    <div class="mb-10">
        <h2 class="text-2xl font-bold mb-4 text-gray-800 flex items-center gap-2">
            <i class="fas fa-book-open text-green-600"></i> Crops Library
        </h2>

        <!-- Filters & Search -->
        <div class="mb-6 flex flex-wrap gap-3 items-center justify-between">
            <div class="flex flex-wrap gap-2">
                <button class="filter-btn px-4 py-2 rounded-lg bg-green-600 text-white font-medium transition-all" data-filter="all">All Crops</button>
                <button class="filter-btn px-4 py-2 rounded-lg bg-gray-200 text-gray-700 font-medium hover:bg-gray-300 transition-all" data-filter="Beverage">☕ Beverage</button>
                <button class="filter-btn px-4 py-2 rounded-lg bg-gray-200 text-gray-700 font-medium hover:bg-gray-300 transition-all" data-filter="Spice">🌶️ Spice</button>
                <button class="filter-btn px-4 py-2 rounded-lg bg-gray-200 text-gray-700 font-medium hover:bg-gray-300 transition-all" data-filter="Cereal">🌾 Cereal</button>
                <button class="filter-btn px-4 py-2 rounded-lg bg-gray-200 text-gray-700 font-medium hover:bg-gray-300 transition-all" data-filter="Oil Seed">🥥 Oil Seed</button>
            </div>
            <div class="relative">
                <i class="fas fa-search absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                <input type="text" id="cropSearch" placeholder="Search by name..." class="pl-10 pr-4 py-2 border border-gray-300 rounded-lg w-64 focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent">
            </div>
            <button id="addCropBtn" class="btn-primary px-5 py-2.5 rounded-lg text-white font-semibold shadow-md flex items-center gap-2">
                <i class="fas fa-plus-circle"></i> Add New Crop
            </button>
        </div>

        <!-- Crops Grid -->
        <div id="cropsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </div>
</main>

<script>
    const CROP_API = 'http://localhost:8080/api/v1/crop';

    let currentCropData = [];
    let currentFilter = "all";
    let currentSearch = "";
    let myCrops = JSON.parse(localStorage.getItem('myCrops') || '[]');

    // Helper: Show/hide loading
    function showLoading(show) {
        if (show) {
            $('#loadingOverlay').removeClass('hidden').addClass('flex');
        } else {
            $('#loadingOverlay').addClass('hidden').removeClass('flex');
        }
    }

    //  FETCH CROPS FROM BACKEND
    async function fetchCrops() {
        showLoading(true);
        try {
            const token = localStorage.getItem('token') || 'demo-token';
            const res = await fetch(`${CROP_API}/all`, {
                headers: {
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json'
                }
            });

            if (!res.ok) {
                // If backend not available, use mock data for demo
                if (res.status === 404 || res.status === 500) {
                    console.warn('Backend unavailable, using demo data');
                    useMockData();
                    showLoading(false);
                    return;
                }
                throw new Error(`HTTP ${res.status}`);
            }

            const apiRes = await res.json();

            if (apiRes.code === 200 && Array.isArray(apiRes.data)) {
                currentCropData = apiRes.data;
            } else if (Array.isArray(apiRes)) {
                currentCropData = apiRes;
            } else {
                currentCropData = [];
            }

            renderCrops();
        } catch (err) {
            console.error('Fetch error:', err);
            // Fallback to mock data for demonstration
            useMockData();
        } finally {
            showLoading(false);
        }
    }

    function renderCrops() {
        let filtered = currentCropData.filter(crop => {
            if (currentFilter !== "all" && crop.category !== currentFilter) return false;
            if (currentSearch &&
                !crop.commonName.toLowerCase().includes(currentSearch.toLowerCase()) &&
                !crop.scientificName.toLowerCase().includes(currentSearch.toLowerCase())) {
                return false;
            }
            return true;
        });

        const container = $('#cropsGrid');

        if (filtered.length === 0) {
            container.html(`
            <div class="col-span-full text-center py-16 bg-white rounded-2xl shadow-sm border-2 border-dashed border-gray-200">
                <i class="fa-solid fa-seedling text-6xl mb-4 text-green-200"></i>
                <p class="text-xl font-semibold text-gray-600">සොයා ගැනීමට නොහැකි විය</p>
                <p class="text-gray-400">වෙනත් නමක් හෝ ප්‍රභේදයක් පරීක්ෂා කර බලන්න.</p>
            </div>
        `);
            return;
        }

        let html = '';
        filtered.forEach(crop => {
            const isAdded = myCrops.some(c => c.cropId === crop.cropId);

            // Category Styles
            const config = {
                'Beverage': { icon: '☕', color: 'bg-amber-100 text-amber-700' },
                'Spice': { icon: '🌶️', color: 'bg-orange-100 text-orange-700' },
                'Cereal': { icon: '🌾', color: 'bg-yellow-100 text-yellow-700' },
                'Oil Seed': { icon: '🥥', color: 'bg-emerald-100 text-emerald-700' },
                'default': { icon: '🌱', color: 'bg-green-100 text-green-700' }
            };
            const style = config[crop.category] || config['default'];

            // Image Handling: වැරදි URL එකක් ආවොත් පෙන්වන්න Default Icon එකක් සහ පින්තූරය
            const imageContent = crop.cropImg && crop.cropImg !== ""
                ? `<img src="${crop.cropImg}" alt="${crop.commonName}" class="w-full h-full object-cover" onerror="this.parentElement.innerHTML='<span class=\'text-6xl\'>${style.icon}</span>'">`
                : `<span class="text-6xl">${style.icon}</span>`;



            html += `
        <div class="bg-white rounded-2xl shadow-sm hover:shadow-xl transition-all duration-300 border border-gray-100 overflow-hidden flex flex-col h-full transform hover:-translate-y-1">
            <div class="relative h-48 flex items-center justify-center overflow-hidden bg-gray-50 border-b border-gray-100">
                ${imageContent}
                <div class="absolute top-3 left-3">
                    <span class="text-[10px] font-bold px-3 py-1 rounded-full shadow-sm uppercase tracking-wider ${style.color}">
                        ${crop.category}
                    </span>
                </div>
                <div class="absolute bottom-3 right-3 bg-white/90 backdrop-blur px-3 py-1 rounded-lg shadow-sm">
                     <span class="text-xs font-bold text-gray-700 italic"><i class="fas fa-leaf text-green-500 mr-1"></i>${crop.season}</span>
                </div>
            </div>

            <div class="p-6 flex-grow">
                <div class="mb-5">
                    <h3 class="text-2xl font-black text-gray-800 tracking-tight capitalize">${escapeHtml(crop.commonName)}</h3>
                    <p class="text-xs text-gray-400 font-medium tracking-wide uppercase mt-1">${escapeHtml(crop.scientificName)}</p>
                </div>

                <div class="grid grid-cols-2 gap-4 mb-6">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 rounded-full bg-blue-50 flex items-center justify-center text-blue-500">
                            <i class="fas fa-clock"></i>
                        </div>
                        <div>
                            <p class="text-[10px] text-gray-400 font-bold uppercase">Duration</p>
                            <p class="text-sm font-bold text-gray-700">${crop.growthDurationDays} Days</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 rounded-full bg-red-50 flex items-center justify-center text-red-500">
                            <i class="fas fa-temperature-high"></i>
                        </div>
                        <div>
                            <p class="text-[10px] text-gray-400 font-bold uppercase">Temp</p>
                            <p class="text-sm font-bold text-gray-700">${crop.minTemp}° - ${crop.maxTemp}°</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 rounded-full bg-green-50 flex items-center justify-center text-green-500">
                            <i class="fas fa-boxes-stacked"></i>
                        </div>
                        <div>
                            <p class="text-[10px] text-gray-400 font-bold uppercase">Yield</p>
                            <p class="text-sm font-bold text-gray-700">${crop.expectedYieldPerUnit} kg</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 rounded-full bg-amber-50 flex items-center justify-center text-amber-500">
                            <i class="fas fa-tag"></i>
                        </div>
                        <div>
                            <p class="text-[10px] text-gray-400 font-bold uppercase">Price</p>
                            <p class="text-sm font-bold text-gray-700">Rs. ${crop.currentMarketPrice}</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="px-6 pb-6 mt-auto">
                <div class="flex items-center gap-3">
                    <button class="predict-yield-btn group flex-1 py-3 text-sm font-bold text-green-600 bg-green-50 rounded-xl hover:bg-green-600 hover:text-white transition-all duration-300" data-id="${crop.cropId}">
                         Predict
                    </button>

                  <button class="edit-crop-btn flex-1 py-3 text-sm font-bold text-blue-600 bg-blue-50 rounded-xl hover:bg-blue-600 hover:text-white transition-all duration-300"
            data-id="${crop.cropId}">
            <i class="fas fa-edit mr-1"></i> Edit
        </button>

        <button class="delete-crop-btn flex-1 py-3 text-sm font-bold text-red-600 bg-red-50 rounded-xl hover:bg-red-600 hover:text-white transition-all duration-300"
            data-id="${crop.cropId}">
            <i class="fas fa-trash-alt mr-1"></i> Delete
        </button>
                </div>
            </div>
        </div>`;
        });

        container.html(html);

        // Event Listeners
        $('.add-btn').off('click').on('click', function() {
            const cropData = $(this).attr('data-crop');
            if (cropData) addToMyCrops(JSON.parse(cropData));
        });

        $('.predict-yield-btn').off('click').on('click', function() {
            predictYield($(this).data('id'));
        });
    }

    // Add to my crops
    function addToMyCrops(crop) {
        if (!myCrops.some(c => c.cropId === crop.cropId)) {
            myCrops.push({
                cropId: crop.cropId,
                commonName: crop.commonName,
                addedDate: new Date().toISOString()
            });
            localStorage.setItem('myCrops', JSON.stringify(myCrops));
            Swal.fire({
                icon: 'success',
                title: 'Crop Planted!',
                text: `${crop.commonName} has been added to your farm.`,
                toast: true,
                timer: 2000,
                showConfirmButton: false,
                background: '#f0fdf4'
            });
            renderCrops(); // Refresh to update button state
        }
    }

    // Predict yield
    async function predictYield(cropId) {
        const { value: landSize } = await Swal.fire({
            title: '🌾 Yield Prediction',
            text: 'Enter land size in acres',
            input: 'number',
            inputPlaceholder: 'e.g., 2.5',
            inputAttributes: {
                min: 0.1,
                step: 0.1
            },
            showCancelButton: true,
            confirmButtonText: 'Predict',
            inputValidator: (value) => {
                if (!value || value <= 0) return 'Please enter a valid land size';
            }
        });

        if (landSize) {
            try {
                const token = localStorage.getItem('token') || 'demo-token';
                const crop = currentCropData.find(c => c.cropId == cropId);
                if (crop) {
                    // Simulate yield prediction based on expected yield
                    const baseYield = parseFloat(crop.expectedYieldPerUnit) || 1000;
                    const predicted = (baseYield * landSize).toFixed(2);
                    Swal.fire({
                        icon: 'info',
                        title: '📊 Yield Prediction',
                        html: `<div class="text-left">
                        <p><strong>Crop:</strong> ${crop.commonName}</p>
                        <p><strong>Land Size:</strong> ${landSize} acres</p>
                        <p><strong>Estimated Yield:</strong> ${predicted} kg</p>
                        <p><strong>Estimated Revenue:</strong> ₹${(predicted * (crop.currentMarketPrice || 50)).toFixed(2)}</p>
                    </div>`,
                        confirmButtonText: 'Great!'
                    });
                } else {
                    // Fallback API call
                    const res = await fetch(`${CROP_API}/${cropId}/predict-yield?landSize=${landSize}`, {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    const data = await res.json();
                    Swal.fire('Yield Prediction', data.data || `Estimated: ${landSize * 1200} kg`, 'info');
                }
            } catch (err) {
                Swal.fire('Info', `Estimated yield for ${landSize} acres: ~${landSize * 1800} kg`, 'info');
            }
        }
    }

    // Edit crop modal
    async function openCropModal(id = null) {
        const isEdit = id !== null;
        let crop = null;

        if (isEdit) {
            crop = currentCropData.find(c => c.cropId == id);
            if (!crop) {
                Swal.fire('Error', 'Crop not found', 'error');
                return;
            }
        }

        const { value: formData } = await Swal.fire({
            title: isEdit ? '✏️ Edit Crop' : '🌱 Add New Crop',
            width: '650px',
            // Padding අඩු කරලා spacing tight කරලා තියෙන්නේ
            html: `
        <div class="text-left grid grid-cols-2 gap-x-4 gap-y-1 px-2">
            <div class="col-span-2 mb-2">
                <label class="block text-xs font-semibold text-gray-600 mb-1">Crop Image</label>
                <input type="file" id="crop-img-file" class="modal-input text-xs py-2" accept="image/*">
                <input type="hidden" id="crop-img-base64" value="${isEdit ? (crop.cropImg || '') : ''}">
            </div>

            ${isEdit ? `<div class="mb-1"><label class="block text-xs font-semibold text-gray-600">Crop ID</label><input id="crop-id" class="modal-input bg-gray-100 py-2" value="${crop.cropId}" disabled></div>` : ''}

            <div class="mb-1"><label class="block text-xs font-semibold text-gray-600">Common Name *</label><input id="crop-name" class="modal-input py-2" placeholder="e.g., Tea" value="${isEdit ? crop.commonName : ''}"></div>

            <div class="mb-1"><label class="block text-xs font-semibold text-gray-600">Scientific Name *</label><input id="crop-scientific" class="modal-input py-2" placeholder="e.g., Camellia" value="${isEdit ? crop.scientificName : ''}"></div>

            <div class="mb-1"><label class="block text-xs font-semibold text-gray-600">Category *</label>
                <select id="crop-category" class="modal-input py-2">
                    <option value="Beverage" ${isEdit && crop.category === 'Beverage' ? 'selected' : ''}>☕ Beverage</option>
                    <option value="Spice" ${isEdit && crop.category === 'Spice' ? 'selected' : ''}>🌶️ Spice</option>
                    <option value="Cereal" ${isEdit && crop.category === 'Cereal' ? 'selected' : ''}>🌾 Cereal</option>
                    <option value="Oil Seed" ${isEdit && crop.category === 'Oil Seed' ? 'selected' : ''}>🥥 Oil Seed</option>
                </select>
            </div>

            <div class="mb-1"><label class="block text-xs font-semibold text-gray-600">Season</label><input id="crop-season" class="modal-input py-2" value="${isEdit ? (crop.season || '') : ''}"></div>

            <div class="mb-1"><label class="block text-xs font-semibold text-gray-600">Market Price (Rs.) *</label><input id="crop-price" class="modal-input py-2" type="number" value="${isEdit ? crop.currentMarketPrice : ''}"></div>

            <div class="mb-1"><label class="block text-xs font-semibold text-gray-600">Min Temp (°C)</label><input id="crop-min-temp" class="modal-input py-2" type="number" value="${isEdit ? crop.minTemp : ''}"></div>

            <div class="mb-1"><label class="block text-xs font-semibold text-gray-600">Max Temp (°C)</label><input id="crop-max-temp" class="modal-input py-2" type="number" value="${isEdit ? crop.maxTemp : ''}"></div>

            <div class="mb-1"><label class="block text-xs font-semibold text-gray-600">Water Index (1-10)</label><input id="crop-water" class="modal-input py-2" type="number" value="${isEdit ? crop.waterRequirementIndex : ''}"></div>

            <div class="mb-1"><label class="block text-xs font-semibold text-gray-600">Growth Duration (Days)</label><input id="crop-duration" class="modal-input py-2" type="number" value="${isEdit ? crop.growthDurationDays : ''}"></div>

            <div class="mb-1"><label class="block text-xs font-semibold text-gray-600">Fertilizer Start Day</label><input id="crop-fert-start" class="modal-input py-2" type="number" value="${isEdit ? crop.fertilizerStartDay : ''}"></div>

            <div class="mb-1"><label class="block text-xs font-semibold text-gray-600">Fertilizer Interval</label><input id="crop-fert-interval" class="modal-input py-2" type="number" value="${isEdit ? crop.fertilizerIntervalDays : ''}"></div>

            <div class="col-span-2 mb-1"><label class="block text-xs font-semibold text-gray-600">Expected Yield</label><input id="crop-yield" class="modal-input py-2" type="number" value="${isEdit ? crop.expectedYieldPerUnit : ''}"></div>
        </div>
        `,
            didOpen: () => {
                $('#crop-img-file').on('change', function() {
                    const file = this.files[0];
                    if (file) {
                        const reader = new FileReader();
                        reader.onload = (e) => $('#crop-img-base64').val(e.target.result);
                        reader.readAsDataURL(file);
                    }
                });
            },
            focusConfirm: false,
            showCancelButton: true,
            confirmButtonText: isEdit ? 'Update Crop' : 'Create Crop',
            confirmButtonColor: '#2563EB', // Blue for update
            cancelButtonColor: '#aaa',
            preConfirm: () => {
                const commonName = $('#crop-name').val()?.trim();
                const scientificName = $('#crop-scientific').val()?.trim();
                const currentMarketPrice = parseFloat($('#crop-price').val());

                if (!commonName || !scientificName || isNaN(currentMarketPrice)) {
                    Swal.showValidationMessage('Please fill all required fields (*)');
                    return false;
                }

                return {
                    ...(isEdit && { cropId: crop.cropId }),
                    commonName,
                    scientificName,
                    category: $('#crop-category').val(),
                    season: $('#crop-season').val(),
                    cropImg: $('#crop-img-base64').val(),
                    growthDurationDays: parseInt($('#crop-duration').val()) || 0,
                    fertilizerStartDay: parseInt($('#crop-fert-start').val()) || 0,
                    fertilizerIntervalDays: parseInt($('#crop-fert-interval').val()) || 0,
                    waterRequirementIndex: parseInt($('#crop-water').val()) || 0,
                    minTemp: parseFloat($('#crop-min-temp').val()) || 0,
                    maxTemp: parseFloat($('#crop-max-temp').val()) || 0,
                    expectedYieldPerUnit: parseFloat($('#crop-yield').val()) || 0,
                    currentMarketPrice
                };
            }
        });

        if (formData) {
            showLoading(true);
            try {
                const token = localStorage.getItem('token') || 'demo-token';
                const url = isEdit ? `${CROP_API}` : `${CROP_API}`;
                const method = isEdit ? 'PUT' : 'POST';

                const res = await fetch(url, {
                    method: method,
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(formData)
                });

                if (res.ok || !isEdit) {
                    // For demo purposes, add to local data if API fails
                    if (!res.ok && !isEdit) {
                        // Add to local state for demo
                        const newId = Math.max(...currentCropData.map(c => c.cropId), 0) + 1;
                        currentCropData.push({ ...formData, cropId: newId });
                        Swal.fire('Success', `Crop "${formData.commonName}" added locally`, 'success');
                    } else {
                        Swal.fire('Success', `Crop ${isEdit ? 'updated' : 'created'} successfully`, 'success');
                    }
                    await fetchCrops(); // Refresh
                } else {
                    throw new Error(await res.text());
                }
            } catch (err) {
                // Fallback: update local data for demo
                if (!isEdit) {
                    const newId = Math.max(...currentCropData.map(c => c.cropId), 0) + 1;
                    currentCropData.push({ ...formData, cropId: newId });
                    Swal.fire('Success', `Crop "${formData.commonName}" added (demo mode)`, 'success');
                    renderCrops();
                } else {
                    const index = currentCropData.findIndex(c => c.cropId == formData.cropId);
                    if (index !== -1) {
                        currentCropData[index] = { ...currentCropData[index], ...formData };
                        Swal.fire('Success', 'Crop updated (demo mode)', 'success');
                        renderCrops();
                    } else {
                        Swal.fire('Error', err.message || 'Operation failed', 'error');
                    }
                }
            } finally {
                showLoading(false);
            }
        }
    }

    // Delete crop function
    async function deleteCrop(id) {
        const result = await Swal.fire({
            title: 'Delete Crop?',
            text: "This action cannot be undone.",
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#EF4444',
            confirmButtonText: 'Yes, delete'
        });

        if (result.isConfirmed) {
            showLoading(true);
            try {
                const token = localStorage.getItem('token') || 'demo-token';
                const res = await fetch(`${CROP_API}/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (res.ok) {
                    Swal.fire('Deleted!', 'Crop has been removed.', 'success');
                    await fetchCrops();
                } else {
                    // Fallback local delete
                    currentCropData = currentCropData.filter(c => c.cropId !== id);
                    Swal.fire('Deleted!', 'Crop removed (demo mode)', 'success');
                    renderCrops();
                }
            } catch (err) {
                currentCropData = currentCropData.filter(c => c.cropId !== id);
                Swal.fire('Deleted!', 'Crop removed locally', 'success');
                renderCrops();
            } finally {
                showLoading(false);
            }
        }
    }

    // Escape HTML helper
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // Event bindings
    $(document).ready(function () {
        fetchCrops();

        // Filter buttons
        $('.filter-btn').click(function () {
            $('.filter-btn').removeClass('bg-green-600 text-white').addClass('bg-gray-200 text-gray-700');
            $(this).removeClass('bg-gray-200 text-gray-700').addClass('bg-green-600 text-white');
            currentFilter = $(this).data('filter');
            renderCrops();
        });

        // Search input
        $('#cropSearch').on('input', function () {
            currentSearch = $(this).val();
            renderCrops();
        });

        // Add crop button
        $('#addCropBtn').click(() => openCropModal());

        // Global delete handler (if needed, can be attached to edit/delete icons if we add table view)
        $(document).on('click', '.delete-crop-btn', function() {
            deleteCrop($(this).data('id'));
        });

        $(document).on('click', '.edit-crop-btn', function() {
            openCropModal($(this).data('id'));
        });
    });
</script>
