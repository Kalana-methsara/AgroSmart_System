<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>AgroSmart · Analyst Dashboard | Crop Health, Harvest & Sales</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    @keyframes fadeSlideUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    .animate-fade-up { animation: fadeSlideUp 0.4s ease-out; }
    .health-gauge { transition: all 0.2s; }
    .stat-card:hover { transform: translateY(-3px); box-shadow: 0 20px 25px -12px rgba(0,0,0,0.1); transition: 0.2s; }
    .harvest-badge { background: linear-gradient(135deg, #fef9e3, #fff7e6); border-left: 4px solid #f59e0b; }
    .trend-up { color: #16a34a; background: #dcfce7; border-radius: 20px; padding: 2px 8px; font-size: 0.7rem; }
    .trend-down { color: #dc2626; background: #fee2e2; border-radius: 20px; padding: 2px 8px; font-size: 0.7rem; }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: #eef2f0; }
    ::-webkit-scrollbar-thumb { background: #9ca3af; border-radius: 10px; }
  </style>
</head>
<body class="bg-gray-50 font-sans antialiased">

<!-- Loading Overlay -->

<!-- Main Layout: Sidebar (compact) + Content -->
<div class="flex h-screen overflow-hidden">
  <!-- Sidebar -->

  <!-- Mobile top bar -->

  <!-- Main Content -->
  <main class="flex-1 overflow-y-auto bg-gray-50 pt-16 md:pt-0">

    <div class="p-6 md:p-8 space-y-8">
      <!-- ==================== OVERVIEW SECTION ==================== -->
      <div id="overview-section" class="section-content animate-fade-up">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
          <div class="bg-white rounded-2xl shadow-md p-5 stat-card border-l-8 border-green-500"><div class="flex justify-between"><div><p class="text-gray-500 text-sm">Total Active Crops</p><h3 class="text-3xl font-bold" id="totalCropsStat">8</h3><p class="text-xs text-green-600 mt-1"><i class="fa-regular fa-chart-line"></i> +2 this season</p></div><i class="fa-solid fa-seedling text-4xl text-green-200"></i></div></div>
          <div class="bg-white rounded-2xl shadow-md p-5 stat-card border-l-8 border-amber-500"><div class="flex justify-between"><div><p class="text-gray-500 text-sm">Avg. Crop Health</p><h3 class="text-3xl font-bold" id="avgHealthStat">86<span class="text-lg">%</span></h3><p class="text-xs text-green-600">↑ 4% vs last month</p></div><i class="fa-solid fa-heartbeat text-4xl text-amber-200"></i></div></div>
          <div class="bg-white rounded-2xl shadow-md p-5 stat-card border-l-8 border-blue-500"><div class="flex justify-between"><div><p class="text-gray-500 text-sm">Est. Season Revenue</p><h3 class="text-3xl font-bold" id="totalRevenueStat">$214.5K</h3><p class="text-xs text-blue-600">↑ 12.3% target</p></div><i class="fa-solid fa-dollar-sign text-4xl text-blue-200"></i></div></div>
        </div>
        <div class="grid md:grid-cols-2 gap-6">
          <div class="bg-white p-5 rounded-xl shadow-md"><h3 class="font-semibold mb-3"><i class="fa-solid fa-chart-scatter text-green-600 mr-2"></i> Yield vs Target (t/ha)</h3><canvas id="yieldTargetChart" height="200"></canvas></div>
          <div class="bg-white p-5 rounded-xl shadow-md"><h3 class="font-semibold mb-3"><i class="fa-solid fa-chart-line text-amber-600 mr-2"></i> Weekly Crop Health Trend</h3><canvas id="healthTrendChart" height="200"></canvas></div>
        </div>
      </div>

    </div>
  </main>
</div>
<script>$(document).ready(function(){
  const token = localStorage.getItem('token');
  if (!token) {
    window.location.replace("../index.html");
    return;
  }

  // Data
  let cropHealthData = {
    Wheat: { health:92 },
    Corn: { health:78 },
    Soybean: { health:88 }
  };

  // Harvest table
  let harvestSchedule = [
    { crop:"Wheat", field:"North Field", planted:"Mar 12, 2026", harvest:"Jun 18, 2026", left:48, maturity:72 },
    { crop:"Corn", field:"South Field", planted:"Apr 05, 2026", harvest:"Jul 22, 2026", left:82, maturity:45 },
    { crop:"Soybean", field:"East Field", planted:"May 20, 2026", harvest:"Aug 05, 2026", left:96, maturity:30 }
  ];

  function renderHarvestTable() {
    let rows = '';
    harvestSchedule.forEach(h => {
      rows += `
        <tr class="border-b">
          <td class="p-3 font-medium">${h.crop}</td>
          <td class="p-3">${h.field}</td>
          <td class="p-3">${h.planted}</td>
          <td class="p-3 font-bold">${h.harvest}</td>
          <td class="p-3">${h.left} days</td>
          <td class="p-3">
            <div class="w-24 bg-gray-200 rounded-full">
              <div class="bg-green-600 text-xs text-white text-center rounded-full" style="width:${h.maturity}%">
                ${h.maturity}%
              </div>
            </div>
          </td>
        </tr>`;
    });
    $('#harvestTableBody').html(rows);
  }

  // Charts (ONLY used ones)
  let yieldTargetCtx, healthTrendCtx;

  function initCharts() {
    yieldTargetCtx = new Chart(document.getElementById('yieldTargetChart'), {
      type:'bar',
      data:{
        labels:['Wheat','Corn','Soybean'],
        datasets:[
          { label:'Current Yield', data:[5.2,8.1,3.4], backgroundColor:'#22c55e' },
          { label:'Target Yield', data:[6.0,9.2,4.0], backgroundColor:'#f59e0b' }
        ]
      }
    });

    healthTrendCtx = new Chart(document.getElementById('healthTrendChart'), {
      type:'line',
      data:{
        labels:['Wk1','Wk2','Wk3','Wk4','Wk5','Wk6'],
        datasets:[
          { label:'Crop Health %', data:[78,81,84,86,88,86], borderColor:'#16a34a' }
        ]
      }
    });
  }

  // Stats
  let cropsTotal = Object.keys(cropHealthData).length;
  let avgHealth = Math.round((92 + 78 + 88)/3);

  $('#totalCropsStat').text(cropsTotal);
  $('#avgHealthStat').html(avgHealth + '<span class="text-lg">%</span>');
  $('#totalRevenueStat').text('$214.5K');

  renderHarvestTable();
  initCharts();
});</script>
</body>
</html>
